<!-- Version Switcher Component Template -->
<!-- 版本切换组件模板 -->

<div id="version-switcher" class="version-switcher">
  <button class="version-switcher-button">
    <span>Version</span>
    <span id="current-version"></span>
    <span class="dropdown-arrow">▼</span>
  </button>
  <div id="version-dropdown" class="version-dropdown">
    <div id="version-list" class="version-list">
      <!-- 版本列表将通过JavaScript动态生成 -->
    </div>
  </div>
</div>
